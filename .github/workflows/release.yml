name: release

# Tag a version (v1.0.0) to build a verifiable release: tests → deterministic
# build → zip → SHA-256 → GitHub Release with the .zip + hash attached.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx vitest run
      - run: node build.mjs
      - name: Package + hash
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="noticed-relationships-${VERSION}.zip"
          (cd dist && zip -rqX "../${ZIP}" .)
          HASH=$(node scripts/hash-artifact.mjs | tail -1)
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "${HASH}  ${ZIP}" > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Reproducible build of the noticed Relationships extension.

            **Artifact SHA-256:** `${{ steps.pkg.outputs.hash }}`

            Verify locally: `npm ci && node build.mjs && node scripts/hash-artifact.mjs` — the digest must match.
            The same `${{ steps.pkg.outputs.zip }}` is what's uploaded to the Chrome Web Store.
          files: |
            ${{ steps.pkg.outputs.zip }}
            SHA256SUMS.txt

      # Auto-publish the new version to the Chrome Web Store. No-ops until the
      # four repo secrets are set (see PUBLISHING.md). The store ITEM must already
      # exist (created by the first manual upload) so CHROME_EXTENSION_ID is known.
      - name: Publish to Chrome Web Store
        if: ${{ env.CHROME_EXTENSION_ID != '' }}
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ steps.pkg.outputs.zip }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
