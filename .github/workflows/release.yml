name: release

# Three ways in:
#   1. Push a version tag (v1.0.0) by hand — the explicit release path.
#   2. Called by auto-tag.yml (workflow_call) right after it pushes the tag for a
#      manifest.json version bump merged to main — the automatic path.
#   3. workflow_dispatch with a tag — manual recovery lever (re-release an existing
#      tag from the Actions UI if a run failed after the tag was created).
# Either way: tests -> deterministic build -> zip -> SHA-256 -> GitHub Release with
# the .zip + hash attached -> publish to the Chrome Web Store.
on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "Version tag to release (e.g. v1.2.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release tag + version
        id: meta
        run: |
          # workflow_call / workflow_dispatch pass the tag as an input; a manual tag
          # push carries it in GITHUB_REF_NAME.
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          case "$TAG" in
            v*) ;;
            *) echo "Refusing to release: '$TAG' is not a v-prefixed tag"; exit 1 ;;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - run: npm ci
      - run: npx vitest run
      - run: node build.mjs
      - name: Package + hash
        id: pkg
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          ZIP="noticed-relationships-${VERSION}.zip"
          (cd dist && zip -rqX "../${ZIP}" .)
          # Stable-named copy so releases/latest/download/noticed-relationships.zip
          # always resolves to the newest release (the in-app install link uses it).
          cp "${ZIP}" noticed-relationships.zip
          HASH=$(node scripts/hash-artifact.mjs | tail -1)
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "${HASH}  ${ZIP}" > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: |
            Reproducible build of the noticed Relationships extension.

            **Artifact SHA-256:** `${{ steps.pkg.outputs.hash }}`

            Verify locally: `npm ci && node build.mjs && node scripts/hash-artifact.mjs` — the digest must match.
            The same `${{ steps.pkg.outputs.zip }}` is what's uploaded to the Chrome Web Store.
          files: |
            ${{ steps.pkg.outputs.zip }}
            noticed-relationships.zip
            SHA256SUMS.txt

      # Auto-publish the new version to the Chrome Web Store. No-ops until the
      # four repo secrets are set (see PUBLISHING.md). The store ITEM must already
      # exist (created by the first manual upload) so CHROME_EXTENSION_ID is known.
      - name: Publish to Chrome Web Store
        if: ${{ env.CHROME_EXTENSION_ID != '' }}
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ steps.pkg.outputs.zip }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
